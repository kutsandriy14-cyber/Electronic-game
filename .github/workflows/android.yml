name: Android CI Build & Auto-Release

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

permissions:
  contents: write

jobs:
  build:
    name: Build, Bump and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle (Auto-Install & Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Configure Git User
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Auto-Bump Version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version_bump
        run: |
          git checkout ${{ github.ref_name }}
          python3 -c '
          import re
          file_path = "app/build.gradle.kts"
          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()

          # Match versionCode
          code_match = re.search(r"versionCode\s*=\s*(\d+)", content)
          if code_match:
              old_code = int(code_match.group(1))
              new_code = old_code + 1
              content = re.sub(r"(versionCode\s*=\s*)\d+", f"\\g<1>{new_code}", content)

          # Match versionName
          name_match = re.search(r"versionName\s*=\s*\"([^\"]+)\"", content)
          if name_match:
              old_name = name_match.group(1)
              parts = old_name.split(".")
              if len(parts) >= 3:
                  parts[-1] = str(int(parts[-1]) + 1)
                  new_name = ".".join(parts)
              else:
                  new_name = old_name + ".1"
              content = re.sub(r"(versionName\s*=\s*)\"[^\"]+\"", f"\\g<1>\"{new_name}\"", content)

          with open(file_path, "w", encoding="utf-8") as f:
              f.write(content)
          '
          # Extract version to temporary var
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          
          # Commit and Push changes back to repo
          git add app/build.gradle.kts
          git commit -m "chore(release): bump version to v$VERSION_NAME [skip ci]"
          git push origin ${{ github.ref_name }}

      - name: Extract Version Name (Fall-back or Non-push)
        if: env.VERSION_NAME == ''
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Set KSP Compilation Strategy to Daemon
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i 's/kotlin.compiler.execution.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Create Git Tag and GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION_NAME }}"
          name: "Release v${{ env.VERSION_NAME }}"
          body: |
            ### 🤖 Автоматический релиз / Automatic Release v${{ env.VERSION_NAME }}
            
            Этот релиз был создан автоматически при отправке изменений в ветку.
            
            #### 📝 Список изменений (Changelog):
            - Автоматический инкремент версии приложения (versionCode & versionName) и фиксация изменений в репозитории.
            - Исправлена проблема сборщика KSP в CI-окружении (NullPointerException) путем переключения на daemon компиляцию на время сборки.
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
